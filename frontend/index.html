<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Turning Points</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; color: #fff; }
      canvas { display: block; }

      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 10; pointer-events: none;
        display: flex; flex-direction: column;
      }

      #header {
        text-align: center;
        padding-top: 40px;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      #header h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 52px; font-weight: 300; letter-spacing: 12px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.9);
        text-shadow: 0 0 40px rgba(255,255,255,0.15);
      }
      #header p {
        font-family: 'Inter', sans-serif;
        font-size: 14px; color: rgba(255,255,255,0.4);
        letter-spacing: 3px; margin-top: 6px;
      }

      #book-tooltip {
        position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
        font-family: 'Cormorant Garamond', serif;
        font-size: 22px; color: rgba(255,255,255,0.8);
        background: rgba(0,0,0,0.5);
        padding: 12px 32px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
        white-space: nowrap;
      }
      #book-tooltip.visible { opacity: 1; }

      #hint {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        font-family: 'Inter', sans-serif;
        font-size: 11px; color: rgba(255,255,255,0.25);
        letter-spacing: 2px;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }

      /* Loading overlay */
      #loading-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(ellipse at center, #fffbe8 0%, #fff 60%, #f0ebe0 100%);
        z-index: 100;
        align-items: center; justify-content: center;
        flex-direction: column;
        transition: opacity 0.6s ease;
        pointer-events: none;
      }
      #loading-overlay h2 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 28px; font-weight: 300; letter-spacing: 8px;
        text-transform: uppercase; color: rgba(60,50,30,0.7);
      }
      .loader {
        width: 32px; height: 32px; margin-top: 24px;
        border: 2px solid rgba(60,50,30,0.1);
        border-top-color: rgba(60,50,30,0.4);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Scene view (when inside a book) */
      #scene-info {
        display: none;
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        padding: 16px 32px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        text-align: center;
        z-index: 10;
        pointer-events: auto;
      }
      #scene-info h2 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 20px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase;
      }
      #scene-info p {
        font-family: 'Inter', sans-serif;
        font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px;
      }
      #back-btn {
        position: fixed; top: 24px; right: 24px; left: auto;
        padding: 8px 20px;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
        color: #fff; border-radius: 4px; cursor: pointer;
        font-family: 'Inter', sans-serif;
        font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
        transition: background 0.2s;
        z-index: 20;
      }
      #back-btn:hover { background: rgba(255,255,255,0.15); }

      /* Portal text bubbles (above each portal in 3D) */
      .portal-bubble {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.5px;
        color: rgba(255,255,255,0.95);
        background: rgba(0,0,0,0.65);
        padding: 8px 14px;
        border-radius: 6px;
        white-space: nowrap;
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(8px);
        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        transform: translate(-50%, -100%);
        user-select: none;
      }
    </style>
  </head>
  <body>

    <div id="loading-overlay" style="display:none; opacity:0;">
      <h2>Entering the story...</h2>
      <div class="loader"></div>
    </div>

    <div id="ui-overlay">
      <div id="header">
        <h1>Turning Points</h1>
        <p>Choose a book. Step inside. Change the story.</p>
      </div>
    </div>

    <div id="book-tooltip"></div>
    <div id="hint">Click a book to enter its world</div>

    <div id="scene-info">
      <h2 id="scene-title"></h2>
      <p id="scene-subtitle"></p>
      <button id="back-btn" tabindex="-1">← Back to Library</button>
    </div>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
